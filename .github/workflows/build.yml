name: Build

on:
  push:
    branches: [main, v2]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos
          - os: windows-2022
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cmake -S . -B build -G Ninja
          else
            cmake -S . -B build
          fi

      - name: Build
        run: cmake --build build --config Release --parallel

      - uses: actions/upload-artifact@v4
        with:
          name: airfx-${{ matrix.name }}
          path: build/package
          if-no-files-found: error
