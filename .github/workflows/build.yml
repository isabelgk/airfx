name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: Which OS(es) to build
        type: choice
        default: all
        options:
          - all
          - macos
          - windows

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - id: set
        run: |
          case "${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}" in
            macos)
              echo 'include=[{"os":"macos-14","name":"macos"}]' >> "$GITHUB_OUTPUT"
              ;;
            windows)
              echo 'include=[{"os":"windows-2022","name":"windows"}]' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'include=[{"os":"macos-14","name":"macos"},{"os":"windows-2022","name":"windows"}]' >> "$GITHUB_OUTPUT"
              ;;
          esac

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.include) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cmake -S . -B build -G Ninja
          else
            cmake -S . -B build
          fi

      - name: Build
        run: cmake --build build --config Release --parallel

      - uses: actions/upload-artifact@v4
        with:
          name: airfx-${{ matrix.name }}
          path: build/package
          if-no-files-found: error

  bundle:
    name: Bundle combined package
    needs: build
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS package
        uses: actions/download-artifact@v4
        with:
          name: airfx-macos
          path: package

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: airfx-windows
          path: package-windows

      - name: Merge Windows externals into combined package
        run: |
          shopt -s nullglob
          files=(package-windows/externals/*.mxe64)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No .mxe64 externals found in the Windows build output" >&2
            exit 1
          fi
          cp -v "${files[@]}" package/externals/

      - name: Zip combined package
        run: (cd package && zip -qr ../package.zip .)

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: package.zip
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: package.zip
          generate_release_notes: true
