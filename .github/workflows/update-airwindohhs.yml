name: Update Airwindohhs

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Import only this exact plugin slug (optional, for testing one)"
        required: false
      max_plugins:
        description: "Max number of new plugins to import this run (0 = unlimited)"
        default: "5"
  schedule:
    - cron: "0 14 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    runs-on: macos-14
    outputs:
      plugins: ${{ steps.list.outputs.plugins }}
      latest_sha: ${{ steps.latest.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: latest
        run: |
          sha=$(git ls-remote https://github.com/isabelgk/airwindohhs.git main | cut -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - id: list
        run: |
          if [ -n "${{ inputs.plugin }}" ]; then
            echo "plugins=$(jq -cn --arg p "${{ inputs.plugin }}" '[$p]')" >> "$GITHUB_OUTPUT"
          else
            current=$(find source/objects -mindepth 2 -maxdepth 2 -type d -name 'airfx.*_tilde' \
              | sed -E 's#.*/airfx\.(.+)_tilde$#\1#' | sort -u)

            python3 - "${{ steps.latest.outputs.sha }}" <<'EOF'
          import re, sys
          sha = sys.argv[1]
          path = "CMakeLists.txt"
          text = open(path).read()
          text = re.sub(
          r"(FetchContent_Declare\(\s*airwindohhs.*?GIT_TAG )[0-9a-f]{40}",
          lambda m: m.group(1) + sha,
          text,
          flags=re.DOTALL,
          )
          open(path, "w").write(text)
          EOF

          cmake -S . -B /tmp/detect-build
          cmake --build /tmp/detect-build --target dump_meta
          all=$(/tmp/detect-build/_deps/airwindohhs-build/dump_meta | python3 -c "import json,sys; [print(p['slug']) for p in json.load(sys.stdin)]" | sort -u)
          missing=$(comm -23 <(echo "$all") <(echo "$current"))

          max="${{ inputs.max_plugins }}"
          max="${max:-5}"
          if [ "$max" != "0" ]; then
            missing=$(echo "$missing" | head -n "$max")
          fi
          echo "plugins=$(echo "$missing" | python3 -c "import json,sys; print(json.dumps([l for l in sys.stdin.read().splitlines() if l]))")" >> "$GITHUB_OUTPUT"

          # Revert the pin bump here -- each matrix job below re-applies it on its
          # own fresh checkout so every per-plugin PR carries its own bump.
          git checkout -- CMakeLists.txt
          fi

  import:
    needs: detect
    if: needs.detect.outputs.plugins != '[]'
    runs-on: macos-14
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "branch=airwindohhs-import/${{ matrix.plugin }}" >> "$GITHUB_OUTPUT"

      - id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh pr list --head "${{ steps.meta.outputs.branch }}" --state open --json number --jq 'length')
          echo "skip=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - if: steps.existing.outputs.skip == 'false'
        run: |
          python3 - "${{ needs.detect.outputs.latest_sha }}" <<'EOF'
          import re, sys
          sha = sys.argv[1]
          path = "CMakeLists.txt"
          text = open(path).read()
          text = re.sub(
              r"(FetchContent_Declare\(\s*airwindohhs.*?GIT_TAG )[0-9a-f]{40}",
              lambda m: m.group(1) + sha,
              text,
              flags=re.DOTALL,
          )
          open(path, "w").write(text)
          EOF

      - if: steps.existing.outputs.skip == 'false'
        run: cmake -S . -B build

      - if: steps.existing.outputs.skip == 'false'
        run: python3 scripts/generate_objects.py --only "${{ matrix.plugin }}"

      - if: steps.existing.outputs.skip == 'false'
        id: verify
        run: |
          cmake -S . -B build
          cmake --build build --target "airfx.${{ matrix.plugin }}_tilde"

      - if: steps.existing.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.meta.outputs.branch }}"
          git add CMakeLists.txt objects.cmake init/objectmappings.txt \
            "source/objects/*/airfx.${{ matrix.plugin }}_tilde" \
            "docs/airfx.${{ matrix.plugin }}~.maxref.xml"
          git commit -m "Add airfx.${{ matrix.plugin }}~"
          git push -u origin "${{ steps.meta.outputs.branch }}"
          gh pr create --title "Add airfx.${{ matrix.plugin }}~" \
            --body "Auto-generated by the Update Airwindohhs workflow. Also bumps the airwindohhs FetchContent pin in CMakeLists.txt to the upstream commit this was generated from, if it moved." \
            --base main --head "${{ steps.meta.outputs.branch }}"
